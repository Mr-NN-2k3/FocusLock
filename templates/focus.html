{% extends 'base.html' %}

{% block content %}
<div class="glass-panel" style="text-align: center;">
    <h1 id="timer-display" style="font-family: var(--font-mono); font-size: 4rem;">00:00</h1>
    <p class="subtitle">Focus Mode Active</p>

    <div style="margin-top: 2rem;">
        <button class="btn-primary" style="background: var(--color-danger); color: white;" onclick="breakSession()">
            Force Break
        </button>
    </div>
</div>

<script>
    // Embed initial state
    window.initialStatus = {{ status | tojson }};
</script>
{% endblock %}
