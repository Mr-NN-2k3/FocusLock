{% extends 'base.html' %}

{% block content %}
<div class="glass-panel">
    <h1>Broken.</h1>
    <p class="subtitle">Failure is allowed. Denial is not.<br>Record your excuse to unlock execution.</p>

    <div class="input-group">
        <label>Why did you break focus?</label>
        <input type="text" id="excuse" placeholder="I got bored..." autofocus>
    </div>

    <button class="btn-primary" onclick="submitExcuse()">Admit & Reset</button>
</div>
{% endblock %}
