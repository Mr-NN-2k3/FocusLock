<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusLock | Authority</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;700&family=Orbitron:wght@600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

    <!-- Background Animation -->
    <div class="bg-grid"></div>

    <!-- Theme Toggle -->
    <button id="theme-toggle" class="theme-toggle">THEME: DARK</button>

    <!-- Violation Overlay (Hidden by default) -->
    <div id="violation-overlay" class="violation-overlay hidden">
        <h1>DISTRACTION<br>DETECTED</h1>
        <p class="mono">CLOSE UNAUTHORIZED WINDOW TO RESUME</p>
    </div>

    <div class="neo-container">
        <header style="text-align: center; margin-bottom: 2rem;">
            <h1>Focus<span class="text-accent">Lock</span></h1>
            <div style="display: flex; justify-content: center; gap: 1rem; margin-bottom: 0.5rem;">
                <span class="status-pill active">LEVEL <span id="user-level">1</span></span>
                <span class="status-pill">XP: <span id="user-xp">0</span></span>
            </div>
            <p class="mono text-muted">SYSTEM AUTHORITY: <span id="system-status" class="text-accent">ONLINE</span></p>
        </header>

        <!-- Active Session View -->
        <div id="session-active-view" class="hidden">
            <div style="text-align: center; margin-bottom: 2rem;">
                <h2 id="timer-display" style="font-size: 4rem; font-family: var(--font-mono);">00:00</h2>
                <p class="mono text-muted">REMAINING</p>
            </div>

            <div style="margin-bottom: 2rem;">
                <p class="mono">STATUS: <span id="session-status-text" class="status-pill active">FOCUSED</span></p>
                <p class="mono">PENALTIES: <span id="session-penalties" class="text-danger">0</span></p>
            </div>

            <button id="break-btn" class="btn" style="background: var(--danger);">EMERGENCY BREAK</button>
        </div>

        <!-- Setup View -->
        <div id="session-setup-view">
            <form id="start-form">


                <div class="input-group">
                    <label>Duration (Minutes)</label>
                    <input type="number" id="duration" value="25" min="1" max="180">
                </div>

                <div class="input-group">
                    <label>Mode</label>
                    <select id="mode">
                        <option value="deep">DEEP WORK (STRICT)</option>
                        <option value="standard">STANDARD (LOOSE)</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Whitelist (Optional, Comma Separated)</label>
                    <input type="text" id="whitelist" placeholder="e.g. stackoverflow, docs, localhost">
                    <p class="mono text-muted" style="font-size: 0.7rem; margin-top: 5px;">If set, ONLY these are allowed.</p>
                </div>

                <div class="input-group">
                    <label>Blacklist (Optional, Comma Separated)</label>
                    <input type="text" id="blacklist" placeholder="e.g. twitter, youtube">
                    <p class="mono text-muted" style="font-size: 0.7rem; margin-top: 5px;">Specific sites to block in addition to AI detection.</p>
                </div>

                <button type="submit" class="btn">INITIATE LOCK</button>
            </form>
        </div>

        <div id="prediction-alert" class="hidden" style="margin-top: 1rem; border: 1px solid var(--danger); padding: 1rem;">
            <strong class="text-danger">FAILURE PREDICTED</strong>
            <p id="prediction-reason" class="mono" style="font-size: 0.8rem;"></p>
        </div>

    </div>

    <script src="{{ url_for('static', filename='js/client.js') }}"></script>
</body>
</html>
