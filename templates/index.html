{% extends 'base.html' %}

{% block content %}
<div class="glass-panel">
    <h1>FocusLock</h1>
    <p class="subtitle">Master your attention. Dictate your time.</p>

    <div class="input-group">
        <label>Session Type</label>
        <select id="mode">
            <option value="deep">Deep Work (Strict)</option>
            <option value="flow">Flow State (Standard)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Duration (Minutes)</label>
        <input type="number" id="duration" value="25" min="1" max="120">
    </div>

    <button class="btn-primary" onclick="startSession()">Initialize Lock</button>
    <div style="text-align: center; margin-top: 1rem;">
        <a href="/analytics" style="color: var(--color-primary-dim); text-decoration: none; font-size: 0.8rem; letter-spacing: 0.1em; text-transform: uppercase;">View System Report</a>
    </div>
</div>
{% endblock %}
