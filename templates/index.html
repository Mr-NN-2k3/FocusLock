<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FocusLock | Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Outfit:wght@600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body>

    <!-- Dynamic Glass Orbs Background -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <button id="theme-toggle" class="theme-toggle">🌗</button>

    <!-- HARD DISTRACTION OVERLAY (Blocking) -->
    <div id="violation-overlay" class="overlay hidden dist-flash">
        <div class="glass-panel text-center">
            <h1 class="text-danger">Distraction Blocked</h1>
            <p class="text-muted" style="margin-bottom: 2rem;">Close unauthorized activity right now.</p>
            <div id="distraction-reason" class="mono text-muted" style="background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 8px;">Waiting for telemetry...</div>
        </div>
    </div>

    <!-- SOFT WARNING OVERLAY (Edge glowing) -->
    <div id="warning-overlay" class="warning-edge hidden"></div>
    <div id="warning-toast" class="toast hidden">
        <strong class="text-warning">⚠️ DRIFT / WARNING</strong>
        <p id="warning-reason" class="mono text-muted" style="font-size: 0.8rem; margin-top: 5px;"></p>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="neo-container">
        
        <header class="text-center" style="margin-bottom: 2rem;">
            <h1>Focus<span class="text-accent">Lock</span></h1>
            <div class="stats-row" style="margin-top: 1rem;">
                <span class="status-pill active">LVL <span id="user-level">1</span></span>
                <span class="status-pill">XP <span id="user-xp">0</span></span>
                <span class="status-pill danger">DEBT <span id="session-penalties">0</span>s</span>
            </div>
        </header>

        <!-- SESSION SETUP VIEW -->
        <div id="session-setup-view">
            <form id="start-form">
                <div class="input-group">
                    <label>Duration (Minutes)</label>
                    <input type="number" id="duration" value="25" min="1" max="180">
                </div>
                <div class="input-group">
                    <label>Goal / Intent (Be Specific)</label>
                    <textarea id="intent" rows="2" placeholder="e.g. Build authentication using React and Firebase"></textarea>
                </div>
                <div class="input-group">
                    <label>Mode</label>
                    <select id="mode">
                        <option value="deep">Cognitive Deep (Strict NLP)</option>
                        <option value="standard">Standard (Lenient)</option>
                    </select>
                </div>
                <button type="submit" class="btn">INITIALIZE ENGINE</button>
            </form>
        </div>

        <!-- ACTIVE SESSION VIEW -->
        <div id="session-active-view" class="hidden">
            
            <!-- Focus Card -->
            <div class="focus-card text-center" style="margin-bottom: 2rem;">
                <h2 id="timer-display" class="timer-text">00:00</h2>
                <div class="mono text-muted">REMAINING</div>
                <p style="margin-top: 1rem;"><span class="status-pill active" id="session-state-pill">PRODUCTIVE</span></p>
                <div id="current-intent-display" class="intent-display"></div>
            </div>

            <!-- Activity Tracker -->
            <div class="activity-tracker">
                <label>Current Telemetry</label>
                <div class="telemetry-box">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                        <span class="mono text-accent" id="app-name">Unknown.exe</span>
                        <span class="mono text-muted" id="latency-ms">0ms</span>
                    </div>
                    <div class="mono" id="window-title" style="font-size: 0.85rem; margin-bottom: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">Waiting for window title...</div>
                    
                    <div class="telemetry-bar-container" title="Confidence">
                        <div class="telemetry-bar-fill conf-fill" id="conf-bar" style="width: 0%"></div>
                        <span class="bar-label">CONFIDENCE <span id="conf-text">0%</span></span>
                    </div>
                    <div class="telemetry-bar-container" title="Semantic Match">
                        <div class="telemetry-bar-fill sim-fill" id="sim-bar" style="width: 0%"></div>
                        <span class="bar-label">SEMANTICS <span id="sim-text">0.0</span></span>
                    </div>
                </div>
            </div>

            <button id="break-btn" class="btn btn-outline" style="margin-top: 1.5rem;">EMERGENCY BREAK</button>
        </div>
        
    </div>

    <script src="{{ url_for('static', filename='js/client.js') }}"></script>
</body>
</html>
